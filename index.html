<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Protegido</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #c41010;
            --gold: #f0a500;
            --text: #e8e8e8;
            --muted: #555;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Syne', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(180,20,20,0.2) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(240,165,0,0.1) 0%, transparent 50%);
            z-index: 0;
        }
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(180, 10, 10, 0.02) 3px, rgba(180, 10, 10, 0.02) 4px);
            pointer-events: none;
            z-index: 1;
        }
        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(180,20,20,0.3);
            box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 60px rgba(180,20,20,0.15);
            text-align: center;
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 2;
            animation: cardEntrance 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--gold), var(--accent), transparent);
        }
        h2 { 
            color: var(--text); 
            margin-bottom: 8px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
            text-transform: uppercase;
            font-size: 22px;
        }
        .subtitle {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 4px;
        }
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: #0d0d0d;
            border: 1px solid #252525;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            color: #fff;
            outline: none;
            transition: all 0.3s;
            -webkit-user-select: text;
            user-select: text;
        }
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(196,16,16,0.2);
        }
        input[type="password"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #c41010 0%, #8a0a0a 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(196,16,16,0.3);
            margin-top: 10px;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196,16,16,0.5);
            filter: brightness(1.1);
        }
        button:active { transform: translateY(0); }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        #error { 
            color: #ff4d4d; 
            margin-top: 15px; 
            font-size: 12px; 
            display: none;
            font-weight: 500;
        }
        #attempts {
            color: var(--muted);
            margin-top: 10px;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            display: none;
        }
        #lockout {
            color: #ff4d4d;
            margin-top: 15px;
            font-size: 12px;
            display: none;
            font-weight: 600;
        }
        .loader {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: none;
            margin: 15px auto 0;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-4px); }
        }
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(196,16,16,0.1);
            border: 1px solid rgba(196,16,16,0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 9px;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            margin-top: 20px;
            letter-spacing: 1px;
        }
        .security-badge::before {
            content: '\1F512';
        }
    </style>
</head>
<body>
    <div class="container" id="login-form">
        <span class="lock-icon">&#128274;</span>
        <h2>Acceso Protegido</h2>
        <div class="subtitle">SISTEMA DE SEGURIDAD AVANZADO</div>
        
        <div class="input-group">
            <label>Contraseña Maestra</label>
            <input type="password" id="password" placeholder="••••••••" autofocus>
        </div>
        
        <button id="btn-unlock" onclick="_d()">Desbloquear</button>
        
        <div class="loader" id="loader"></div>
        <p id="error">ACCESO DENEGADO</p>
        <p id="attempts"></p>
        <p id="lockout"></p>
        
        <div class="security-badge">AES-256-GCM &bull; PBKDF2-600K</div>
    </div>

        var _s = "HAI4ehAPsPIYQbg3qF0/ng==";
        var _n = "I7KvbobVMf60Mx1S";
        
        // ===== CONFIGURACIÓN =====
        var _SD = 86400000;  // Duración sesión (ms)
        var _MA = 5;  // Máximo intentos
        var _LT = 900000;  // Tiempo bloqueo (ms)
        var _SK = "x_s_" + btoa("HAI4ehAPsPIYQbg3qF0/ng==").substring(0,8);  // Key única para localStorage
        var _AK = "x_a_" + btoa("HAI4ehAPsPIYQbg3qF0/ng==").substring(0,8);  // Key para intentos
        
        var _attempts = 0;

        // ===== VERIFICAR SESIÓN AL CARGAR =====
        function _cs() {
            try {
                var s = JSON.parse(localStorage.getItem(_SK));
                if(s && s.p && s.x) {
                    if(Date.now() < s.x) {
                        _dp(s.p);
                        return;
                    } else {
                        localStorage.removeItem(_SK);
                    }
                }
            } catch(e) {
                localStorage.removeItem(_SK);
            }
            // Verificar bloqueo
            _cl();
        }

        // Verificar lockout
        function _cl() {
            try {
                var a = JSON.parse(localStorage.getItem(_AK));
                if(a && a.l && Date.now() < a.l) {
                    _showLockout(a.l - Date.now());
                } else if(a && a.l && Date.now() >= a.l) {
                    localStorage.removeItem(_AK);
                }
            } catch(e) {}
        }

        function _showLockout(remaining) {
            var btn = document.getElementById('btn-unlock');
            var inp = document.getElementById('password');
            var lockEl = document.getElementById('lockout');
            btn.disabled = true;
            inp.disabled = true;
            
            function updateTimer() {
                var r = Math.max(0, remaining);
                var min = Math.floor(r / 60000);
                var sec = Math.floor((r % 60000) / 1000);
                lockEl.textContent = 'BLOQUEADO: ' + min + 'm ' + sec + 's restantes';
                lockEl.style.display = 'block';
                remaining -= 1000;
                if(remaining <= 0) {
                    btn.disabled = false;
                    inp.disabled = false;
                    lockEl.style.display = 'none';
                    localStorage.removeItem(_AK);
                } else {
                    setTimeout(updateTimer, 1000);
                }
            }
            updateTimer();
        }

        function _ss(p) {
            localStorage.setItem(_SK, JSON.stringify({p:p, x:Date.now()+_SD}));
        }

        // ===== DESENCRIPTAR =====
        async function _dp(password) {
            var errorEl = document.getElementById('error');
            var loader = document.getElementById('loader');
            var attEl = document.getElementById('attempts');
            
            if(errorEl) errorEl.style.display = 'none';
            if(loader) loader.style.display = 'block';

            try {
                var saltBuf = Uint8Array.from(atob(_s), function(c){return c.charCodeAt(0);});
                var nonceBuf = Uint8Array.from(atob(_n), function(c){return c.charCodeAt(0);});
                var encBuf = Uint8Array.from(atob(_e), function(c){return c.charCodeAt(0);});

                var enc = new TextEncoder();
                var keyMat = await crypto.subtle.importKey(
                    "raw", enc.encode(password),
                    {name:"PBKDF2"}, false, ["deriveKey"]
                );

                var key = await crypto.subtle.deriveKey(
                    {name:"PBKDF2", salt:saltBuf, iterations:600000, hash:"SHA-256"},
                    keyMat,
                    {name:"AES-GCM", length:256}, false, ["decrypt"]
                );

                var dec = await crypto.subtle.decrypt(
                    {name:"AES-GCM", iv:nonceBuf}, key, encBuf
                );

                var html = new TextDecoder().decode(dec);
                
                // Éxito: guardar sesión y limpiar intentos
                _ss(password);
                localStorage.removeItem(_AK);

                document.open();
                document.write(html);
                document.close();

            } catch(e) {
                localStorage.removeItem(_SK);
                _attempts++;
                
                if(loader) loader.style.display = 'none';
                
                // Verificar máximo de intentos
                if(_attempts >= _MA) {
                    var lockUntil = Date.now() + _LT;
                    localStorage.setItem(_AK, JSON.stringify({c:_attempts, l:lockUntil}));
                    _showLockout(_LT);
                    _attempts = 0;
                } else {
                    if(errorEl) errorEl.style.display = 'block';
                    if(attEl) {
                        attEl.textContent = 'Intentos: ' + _attempts + '/' + _MA;
                        attEl.style.display = 'block';
                    }
                    // Vibración
                    var c = document.querySelector('.container');
                    if(c) {
                        c.style.animation = 'none';
                        c.offsetHeight;
                        c.style.animation = 'shake 0.4s ease-in-out';
                    }
                }
            }
        }

        // Función pública para el botón
        window._d = async function() {
            var p = document.getElementById('password').value;
            if(!p) return;
            await _dp(p);
        };

        // Enter para desbloquear
        document.getElementById('password').addEventListener('keypress', function(e){
            if(e.key === 'Enter') window._d();
        });

        // Iniciar verificación de sesión
        _cs();
    })();
