<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Protegido | IPTV</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #c41010;
            --gold: #f0a500;
            --text: #e8e8e8;
            --muted: #555;
        }
        body {
            font-family: 'Syne', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        /* Fondo con gradientes */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(180,20,20,0.2) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(240,165,0,0.1) 0%, transparent 50%);
            z-index: 0;
        }
        /* Líneas de escaneo */
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(180, 10, 10, 0.02) 3px, rgba(180, 10, 10, 0.02) 4px);
            pointer-events: none;
            z-index: 1;
        }
        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(180,20,20,0.3);
            box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 60px rgba(180,20,20,0.15);
            text-align: center;
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 2;
            animation: cardEntrance 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--gold), var(--accent), transparent);
        }
        h2 { 
            color: var(--text); 
            margin-bottom: 8px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
            text-transform: uppercase;
            font-size: 22px;
        }
        .subtitle {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 4px;
        }
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: #0d0d0d;
            border: 1px solid #252525;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(196,16,16,0.2);
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #c41010 0%, #8a0a0a 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(196,16,16,0.3);
            margin-top: 10px;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196,16,16,0.5);
            filter: brightness(1.1);
        }
        button:active { transform: translateY(0); }
        #error { 
            color: #ff4d4d; 
            margin-top: 15px; 
            font-size: 12px; 
            display: none;
            font-weight: 500;
        }
        .loader {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: none;
            margin: 15px auto 0;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container" id="login-form">
        <h2>Acceso Protegido</h2>
        <div class="subtitle">IPTV PLAYER - ACCESO PRIVADO</div>
        
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autofocus>
        </div>
        
        <button onclick="decrypt()">Desbloquear</button>
        
        <div class="loader" id="loader"></div>
        <p id="error">ACCESO DENEGADO: Contraseña Incorrecta</p>
    </div>

                container.style.animation = 'shake 0.4s ease-in-out';
            } finally {
                loader.style.display = 'none';
            }
        }

        // Estilo para la vibración de error
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                50% { transform: translateX(8px); }
                75% { transform: translateX(-4px); }
            }
        `;
        document.head.appendChild(style);

        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                decrypt();
            }
        });
    </script>
</body>
</html>
