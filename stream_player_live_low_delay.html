<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
</head>
<body style="margin:0; background:#000;">
    
    <div id="video-container" data-shaka-player-container style="width:100%; height:100vh;">
        <video id="video" data-shaka-player autoplay style="width:100%; height:100%;"></video>
    </div>

    <script>
    async function init() {
        const video = document.getElementById('video');
        const uiContainer = document.getElementById('video-container');
        
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, uiContainer, video);

        player.configure({
            drm: {
                clearKeys: {
                    '5983506f3f2e0b6df98fd1856adf45b6': 'd2ae7ea26cfdc61ba0f71771539ff87f'
                },
                servers: {}
            },
            manifest: { 
                dash: { ignoreDrmInfo: true }
            },
            // OPTIMIZACIÓN PARA STREAMING EN VIVO CON BAJO DELAY (6 segundos)
            streaming: {
                lowLatencyMode: true,      // ⚡ ACTIVA MODO BAJO DELAY
                bufferingGoal: 6,          // Solo 6 segundos de buffer
                rebufferingGoal: 2,        // Empieza a reproducir con 2 segundos
                bufferBehind: 3,           // Mantiene solo 3 segundos atrás
                bufferTimeMax: 8,          // Máximo 8 segundos en buffer
                jumpLargeGaps: true,
                // Agresivo en stalls para mantener baja latencia
                stall: {
                    enabled: true,
                    threshold: 0.5,         // Detecta stalls rápido
                    lingerTime: 1000        // Recupera en 1 segundo
                }
            },
            // ABR (Adaptive Bitrate) conservador
            abr: {
                enabled: true,
                useNetworkInformation: true,
                defaultBandwidthEstimate: 5000000,
                switchInterval: 5,         // Cambios rápidos de calidad
                fastHalfLife: 4,
                slowHalfLife: 30
            }
        });

        // Eventos de streaming
        player.addEventListener('streaming', () => {
            console.log('🔴 VIVO - Streaming iniciado');
        });

        player.addEventListener('buffering', () => {
            console.log('⏳ Buffering...');
        });

        player.addEventListener('bufferingEnd', () => {
            console.log('✅ Buffer completo - Reproduciendo VIVO');
        });

        // UI Configuration con velocidades
        ui.configure({
            'controlPanelElements': [
                'play_pause',
                'time_and_duration',
                'spacer',
                'playback_rate',
                'quality',
                'fullscreen'
            ],
            'playbackRates': [0.5, 0.75, 1, 1.25, 1.5, 2],
            'enableTooltips': true,
            'enableKeyboardPlaybackControls': true
        });

        // Monitorear latencia
        player.addEventListener('adaptation', () => {
            const bufStats = player.getStats();
            if (bufStats) {
                console.log('Latencia: ~' + Math.round(bufStats.bufferingHistory[0] || 0) + 'ms');
            }
        });

        try {
            await player.load('https://abl6x4raaaaaaaamn67hgjdjwdebj.ta.bia-cf.live.pv-cdn.net/iad-nitro/live/clients/dash/enc/9bwnwl4oqk/out/v1/3fda5baf7b1b47e8b80ff18979d55b52/cenc.mpd');
            console.log('✅ VIVO ACTIVADO - Delay máximo: 6 segundos');
        } catch (e) {
            console.error('❌ Error:', e.code, e.message);
        }
    }

    document.addEventListener('shaka-ui-loaded', init);
    if (document.readyState !== 'loading') { init(); }
    </script>
</body>
</html>
